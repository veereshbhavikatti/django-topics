<!DOCTYPE html>
<html>
<head>
    <title>Employee Data</title>
</head>

<body>

<h1>Employee Information</h1>

{% if emp_data %}

<table border="1">

    <thead>
        <tr>
            <th>Eno</th>
            <th>Ename</th>
            <th>Esal</th>
            <th>Eaddr</th>
        </tr>
    </thead>

    <tbody>

        {% for emp in emp_data %}

        <tr>
            <td>{{ emp.eno }}</td>
            <td>{{ emp.ename }}</td>
            <td>{{ emp.esal }}</td>
            <td>{{ emp.eadd }}</td>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% else %}

<p>No records found</p>

{% endif %}

</body>
</html>
